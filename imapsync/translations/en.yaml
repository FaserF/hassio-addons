configuration:
  sync_interval:
    name: "Sync Interval"
    description: "The time in seconds to wait between synchronization cycles."
  log_level:
    name: "Log Level"
    description: "Adjust the verbosity of the add-on logs."
  jobs:
    name: "Synchronization Jobs"
    description: "List of all synchronization tasks. You can add multiple independent sync pairs (e.g. Account A to B, Account C to D)."
  source_host:
    name: "Source Host"
    description: "The source IMAP server."
  source_user:
    name: "Source Username"
    description: "The username/email for the source server."
  source_auth_type:
    name: "Source: Authentication Method"
    description: "REQUIRED. Choose 'password' for traditional login or 'oauth2' for modern authentication (Google/Microsoft)."
  source_password:
    name: "Source: Password"
    description: "REQUIRED for 'password' method. Enter your primary password or an App Password."
  source_oauth2_client_id:
    name: "Source: OAuth2 Client ID"
    description: "REQUIRED for 'oauth2' method. Obtain this from the Google Cloud Console or Azure Portal."
  source_oauth2_client_secret:
    name: "Source: OAuth2 Client Secret"
    description: "REQUIRED for 'oauth2' method. Obtain this from the Google Cloud Console or Azure Portal."
  source_oauth2_refresh_token:
    name: "Source: OAuth2 Refresh Token"
    description: "REQUIRED for 'oauth2' method (Both Google & Microsoft). Long-lived token used for background syncing."
  source_oauth2_tenant_id:
    name: "Source: OAuth2 Tenant ID"
    description: "OPTIONAL (Microsoft Only). Not used for Google. Usually 'common' for personal Outlook/Office365 accounts."
  source_oauth2_provider:
    name: "Source: OAuth2 Provider"
    description: "REQUIRED for 'oauth2'. Choose 'google' or 'microsoft'."
  destination_host:
    name: "Destination Host"
    description: "REQUIRED. The destination IMAP server (e.g., imap.gmail.com)."
  destination_user:
    name: "Destination Username"
    description: "REQUIRED. Correct username or email for the destination server."
  destination_auth_type:
    name: "Destination: Authentication Method"
    description: "REQUIRED. Choose 'password' for traditional login or 'oauth2' for modern authentication (Google/Microsoft)."
  destination_password:
    name: "Destination: Password"
    description: "REQUIRED for 'password' method. Enter your primary password or an App Password."
  destination_oauth2_client_id:
    name: "Destination: OAuth2 Client ID"
    description: "REQUIRED for 'oauth2' method. Obtain this from the Google Cloud Console or Azure Portal."
  destination_oauth2_client_secret:
    name: "Destination: OAuth2 Client Secret"
    description: "REQUIRED for 'oauth2' method. Obtain this from the Google Cloud Console or Azure Portal."
  destination_oauth2_refresh_token:
    name: "Destination: OAuth2 Refresh Token"
    description: "REQUIRED for 'oauth2' method (Both Google & Microsoft). Long-lived token used for background syncing."
  destination_oauth2_tenant_id:
    name: "Destination: OAuth2 Tenant ID"
    description: "OPTIONAL (Microsoft Only). Not used for Google. Usually 'common' for personal Outlook/Office365 accounts."
  destination_oauth2_provider:
    name: "Destination: OAuth2 Provider"
    description: "REQUIRED for 'oauth2'. Choose 'google' or 'microsoft'."
  delete_after_sync:
    name: "Delete after sync"
    description: "If enabled, e-mails will be deleted from the source after they are successfully synced to the destination. USE WITH CAUTION!"
  included_folders:
    name: "Included Folders (Regex List)"
    description: "OPTIONAL. List of regular expressions. Only folders matching these will be synced. Example: ['^INBOX$', '^Sent']"
  excluded_folders:
    name: "Excluded Folders (Regex List)"
    description: "OPTIONAL. List of regular expressions. Folders matching these will be skipped. Example: ['^Trash$', '^Junk']"
  max_age:
    name: "Max Age (Days)"
    description: "OPTIONAL. Skip messages older than this number of days. Set to 0 to sync all messages."
  max_size:
    name: "Max Size (Bytes)"
    description: "OPTIONAL. Skip messages larger than this number of bytes. Set to 0 for no limit."
  sync_internal_dates:
    name: "Sync Internal Dates"
    description: "Preserve the original 'Received' date of messages. Usually recommended to keep enabled."
  subscribe_folders:
    name: "Subscribe Folders"
    description: "Subscribe folders on the destination server if they are subscribed on the source."
  sync_gmail_labels:
    name: "Sync Gmail Labels"
    description: "Gmail specific. Sync and resync Gmail labels (treated as folders by imapsync)."
  dry_run:
    name: "Dry Run"
    description: "If enabled, imapsync will show what it would do without actually making any changes."
  additional_cli_args:
    name: "Additional CLI Arguments"
    description: "Extra arguments to pass directly to the imapsync CLI."
