worker_processes  1;
pid /var/run/nginx.pid;
error_log /dev/stdout info;

events {
    worker_connections  1024;
}

http {
    include            mime.types;
    default_type       application/octet-stream;
    sendfile           on;
    keepalive_timeout  65;
    access_log         /dev/stdout;

    server {
        listen 8099; # Ingress port (default inside container usually) - wait, Solumati used 8099 in config but Nginx usually listens on 80 or similar.
        # Solumati run.sh: nginx -g "daemon off;" &
        # But ingress usually maps to an internal port.
        # Solumati ports: 80/tcp: 8099. So typically internal 80.
        # Let's check Solumati config again.
        # Solumati config: ports 80/tcp: 8099. This maps container 80 to host 8099.
        # Ingress: true.
        # Wait, if Ingress is true, we need to handle Ingress header.
        # Let's check Solumati nginx.conf if possible. I missed viewing it.
        # I'll use a standard Ingress compatible config.

        listen 80;
        server_name localhost;

        root /app/frontend;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (if needed)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
