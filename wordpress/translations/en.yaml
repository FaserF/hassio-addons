configuration:
  database_host:
    name: Database Host
    description: Hostname of your MariaDB/MySQL database.
  database_name:
    name: Database Name
    description: Name of the database to use.
  database_user:
    name: Database User
    description: Username for the database.
  database_password:
    name: Database Password
    description: Password for the database.
  wordpress_title:
    name: Site Title
    description: Title of your WordPress site.
  wordpress_admin_user:
    name: Admin User
    description: Username for the generic admin account.
  wordpress_admin_password:
    name: Admin Password
    description: Password for the generic admin account.
  wordpress_admin_email:
    name: Admin Email
    description: Email address for the generic admin account.
  wordpress_url:
    name: Website URL
    description: The URL where the WordPress site will be accessible.
  ssl:
    name: SSL
    description: Enable SSL/HTTPS for the site.
  certfile:
    name: SSL Certificate
    description: Name of the SSL certificate file.
  keyfile:
    name: SSL Key
    description: Name of the private SSL key file.
  log_level:
    name: "Log Level"
    description: "Adjust the verbosity of the logs."
  reset_database:
    name: Reset Database
    description: Enable this option to reset the database. WARNING - Deletes all data!
  reset_database_confirm:
    name: Confirm Database Reset
    description: Confirm the database reset. Both options must be enabled.
network:
  80/tcp: Web Interface
