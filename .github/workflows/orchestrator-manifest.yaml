---
name: Orchestrator Manifest

on:
  push:
    branches:
      - master
    paths-ignore:
      - "project_manifest.json"
      - "project_connections.json"
      - "**.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate-manifest:
    name: Generate Project Manifest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: ⤵️ Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: 📋 Generate Manifest & Connection Map
        run: |
          python .scripts/generate_manifest.py

      - name: 📤 Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add project_manifest.json project_connections.json
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "chore: update project_manifest.json and project_connections.json [skip ci]" && \
            git push
