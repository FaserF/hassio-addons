name: Orchestrator Link Checker

on:
  push:
    branches:
      - master
    paths:
      - "**/*.md"
      - ".github/workflows/orchestrator-link-checker.yaml"
  pull_request:
    branches:
      - master
    paths:
      - "**/*.md"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  link-checker:
    name: 🔗 Link Checker
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code
        uses: actions/checkout@v4

      - name: 🔍 Check Links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress "**/*.md"
          # Fail the job if broken links are found
          fail: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

