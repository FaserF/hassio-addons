---
name: CodeQL

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "project_manifest.json"
      - "project_connections.json"
      - ".github/workflows/**"
  pull_request:
    branches:
      - master
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "project_manifest.json"
      - "project_connections.json"
      - ".github/workflows/**"
  schedule:
    - cron: "30 1 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-codeql
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["python", "actions"]

    steps:
      - name: Check if GitHub Advanced Security is enabled
        id: check_ghas
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          STATUS=$(gh api repos/$REPO --jq '.security_and_analysis.advanced_security.status // "disabled"' 2>/dev/null || echo "disabled")
          if [ "$STATUS" = "enabled" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Advanced Security is enabled - CodeQL will run."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Advanced Security is not enabled. CodeQL analysis will be skipped."
          fi

      - name: Checkout repository
        if: steps.check_ghas.outputs.enabled == 'true'
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        if: steps.check_ghas.outputs.enabled == 'true'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        if: steps.check_ghas.outputs.enabled == 'true'
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        if: steps.check_ghas.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
