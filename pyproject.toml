[tool.black]
line-length = 120
target-version = ['py314']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | node_modules
  | tmp
)/
'''

[tool.ruff]
line-length = 120
target-version = "py314"
exclude = ["node_modules", "tmp"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"] # Ignore line length for now as many scripts are slightly over

[tool.mypy]
python_version = "3.14"
show_error_codes = true
ignore_missing_imports = true
check_untyped_defs = true
exclude = ["node_modules", "tmp"]

[[tool.mypy.overrides]]
module = "homeassistant.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "voluptuous.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "yaml.*"
ignore_missing_imports = true
