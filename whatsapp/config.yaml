name: "WhatsApp Home Assistant App"
version: "1.6.2"
slug: "whatsapp"
image: ghcr.io/faserf/hassio-addons-whatsapp-{arch}
description: "Home Assistant WhatsApp App (Baileys/Node.js)."
url: "https://github.com/FaserF/ha-whatsapp"
arch:
  - aarch64
  - amd64
init: false
host_network: true
map:
  - homeassistant_config:rw
  - media:rw
panel_icon: mdi:whatsapp
options:
  log_level: "info"
  reset_session: false
  send_message_timeout: 25000
  keep_alive_interval: 30000
  mask_sensitive_data: false
  webhook_enabled: false
  webhook_url: ""
  webhook_token: ""
  ui_auth_enabled: false
  ui_auth_password: ""
  mark_online: false
  media_folder: ""
  admin_numbers: ""
  welcome_message_enabled: false
  admin_notifications_enabled: true
  message_send_interval: 1000
  group_fetch_interval: 300000
  group_fetch_cooldown_on_error: 60000
  group_fetch_cooldown_on_rate_limit: 900000
  reject_unauthorized: true

schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  reset_session: bool
  send_message_timeout: int
  keep_alive_interval: int
  mask_sensitive_data: bool
  webhook_enabled: bool
  webhook_url: str?
  webhook_token: str?
  ui_auth_enabled: bool
  ui_auth_password: str?
  mark_online: bool
  media_folder: str?
  admin_numbers: str?
  welcome_message_enabled: bool
  admin_notifications_enabled: bool
  message_send_interval: int
  group_fetch_interval: int
  group_fetch_cooldown_on_error: int
  group_fetch_cooldown_on_rate_limit: int
  reject_unauthorized: bool

ports:
  8066/tcp: 8066
hassio_api: true
ingress: true
ingress_port: 8066
ingress_entry: /
