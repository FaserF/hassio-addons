configuration:
  log_level:
    name: Log Level
    description: Controls the verbosity of the logs.
  reset_session:
    name: Reset Session
    description: "⚠️ DANGER: Enabling this will delete your WhatsApp session data on the next startup. The toggle will automatically disable itself after reset."
  mask_sensitive_data:
    name: "Mask Sensitive Data"
    description: "If enabled, phone numbers in logs will be partially hidden (e.g. 4917*****123). Useful when sharing logs."
  send_message_timeout:
    name: "Send Timeout (ms)"
    description: "Time in milliseconds to wait for a WhatsApp acknowledgement before timing out (Default: 25000)."
  keep_alive_interval:
    name: "Keep-Alive Interval (ms)"
    description: "How often (in ms) to check the connection to detect stale connections (Default: 30000)."
  webhook_enabled:
    name: "Webhook Enabled"
    description: "If enabled, incoming WhatsApp messages will be forwarded to the specified Webhook URL."
  webhook_url:
    name: "Webhook URL"
    description: "The destination URL for forwarded messages (e.g. your Rocket.Chat app endpoint)."
  webhook_token:
    name: "Webhook Token"
    description: "A secret token sent with the webhook request (X-Webhook-Token header) to secure the communication."
  ui_auth_enabled:
    name: "UI Authentication"
    description: "Enables Basic Authentication for the Web UI (Port 8066). Recommeded if exposed to the internet."
  ui_auth_password:
    name: "UI Password"
    description: "The password for the Web UI (Username is always 'admin')."
  media_folder:
    name: "Media Folder"
    description: "Path to a public folder (e.g. /media/whatsapp) to save received media. If set, automatic cleanup is DISABLED."
  mark_online:
    name: "Mark Online"
    description: "Whether to mark the bot as online in WhatsApp."
  admin_notifications_enabled:
    name: "Admin Notifications"
    description: "If enabled, the bot will send connection status and failure notifications to the listed admin numbers."
  admin_numbers:
    name: "Admin Phone Numbers"
    description: "A comma-separated list of phone numbers (with country code, e.g. 491701234567) that should receive admin notifications."
  welcome_message_enabled:
    name: "Welcome Message"
    description: "Whether to send a one-time welcome message to users who message the bot for the first time."
  message_send_interval:
    name: "Message Send Interval (ms)"
    description: "Delay in milliseconds between sending consecutive messages to avoid rate limits (Default: 1000)."
  group_fetch_interval:
    name: "Group Fetch Interval (ms)"
    description: "Interval in milliseconds between refreshing group metadata (Default: 300000 / 5 minutes)."
  group_fetch_cooldown_on_error:
    name: "Group Fetch Error Cooldown (ms)"
    description: "Cooldown period in milliseconds after a generic group fetch error before retrying (Default: 60000)."
  group_fetch_cooldown_on_rate_limit:
    name: "Group Fetch Rate-Limit Cooldown (ms)"
    description: "Cooldown period in milliseconds after hitting a WhatsApp rate limit for group fetches (Default: 900000 / 15 minutes)."
  reject_unauthorized:
    name: "Reject Unauthorized Certificates"
    description: "Whether to reject self-signed or unauthorized certificates when fetching media URLs or calling APIs (Disable to allow self-signed certificates)."
network:
  8066/tcp: Internal API port the integration connects to.
