configuration:
  log_level:
    name: "Logging-Stufe"
    description: Steuert die Ausführlichkeit der Protokolle.
  reset_session:
    name: "Sitzung zurücksetzen"
    description: "⚠️ GEFAHR: Aktiviert das Löschen deiner WhatsApp-Sitzung beim nächsten Start. Der Schalter deaktiviert sich nach dem Zurücksetzen automatisch."
  mask_sensitive_data:
    name: "Sensible Daten maskieren"
    description: "Wenn aktiviert, werden Telefonnummern in den Logs teilweise unkenntlich gemacht (z.B. 4917*****123). Hilfreich beim Teilen von Logs."
  send_message_timeout:
    name: "Sende-Timeout (ms)"
    description: "Zeit in Millisekunden, die auf eine Bestätigung von WhatsApp gewartet wird, bevor abgebrochen wird (Standard: 25000)."
  keep_alive_interval:
    name: "Keep-Alive Intervall (ms)"
    description: "Wie oft (in ms) die Verbindung geprüft werden soll, um 'stale' Verbindungen zu erkennen (Standard: 30000)."
  webhook_enabled:
    name: "Webhook Aktiviert"
    description: "Wenn aktiviert, werden eingehende WhatsApp-Nachrichten an die angegebene Webhook-URL weitergeleitet."
  webhook_url:
    name: "Webhook-URL"
    description: "Die Ziel-URL für weitergeleitete Nachrichten (z.B. der Endpunkt deiner Rocket.Chat-App)."
  webhook_token:
    name: "Webhook-Token"
    description: "Ein geheimer Token, der mit der Webhook-Anfrage gesendet wird (X-Webhook-Token Header), um die Kommunikation abzusichern."
  ui_auth_enabled:
    name: "UI Authentifizierung"
    description: "Aktiviert die Basis-Authentifizierung für die Web-Oberfläche (Port 8066). Empfohlen, wenn die Homeassistant App im Internet freigegeben ist."
  ui_auth_password:
    name: "UI Passwort"
    description: "Das Passwort für die Web-Oberfläche (Benutzername ist immer 'admin')."
  media_folder:
    name: "Medien-Ordner"
    description: "Pfad zu einem öffentlichen Ordner (z.B. /media/whatsapp) zum Speichern empfangener Medien. Falls gesetzt, ist die automatische Bereinigung DEAKTIVIERT."
  mark_online:
    name: "Online anzeigen"
    description: "Gibt an, ob der Bot in WhatsApp als online angezeigt werden soll."
  admin_notifications_enabled:
    name: "Admin-Benachrichtigungen"
    description: "Wenn aktiviert, sendet der Bot Verbindungsstatus- und Fehlerbenachrichtigungen an die aufgelisteten Admin-Nummern."
  admin_numbers:
    name: "Admin-Telefonnummern"
    description: "Eine durch Kommas getrennte Liste von Telefonnummern (mit Ländervorwahl, z.B. 491701234567), die Admin-Benachrichtigungen erhalten sollen."
  welcome_message_enabled:
    name: "Willkommensnachricht"
    description: "Gibt an, ob eine einmalige Willkommensnachricht an Benutzer gesendet werden soll, die den Bot zum ersten Mal anschreiben."
  message_send_interval:
    name: "Sende-Intervall (ms)"
    description: "Verzögerung in Millisekunden zwischen dem Senden aufeinanderfolgender Nachrichten, um Ratenbegrenzungen zu vermeiden (Standard: 1000)."
  group_fetch_interval:
    name: "Gruppen-Aktualisierungsintervall (ms)"
    description: "Intervall in Millisekunden zwischen der Aktualisierung der Gruppen-Metadaten (Standard: 300000 / 5 Minuten)."
  group_fetch_cooldown_on_error:
    name: "Gruppen-Fehler-Abkühlzeit (ms)"
    description: "Abkühlzeit in Millisekunden nach einem allgemeinen Gruppen-Abruffehler vor einem erneuten Versuch (Standard: 60000)."
  group_fetch_cooldown_on_rate_limit:
    name: "Gruppen-Ratenlimit-Abkühlzeit (ms)"
    description: "Abkühlzeit in Millisekunden nach Erreichen eines WhatsApp-Ratenlimits für Gruppenabrufe (Standard: 900000 / 15 Minuten)."
network:
  8066/tcp: Interner API-Port, über den sich die Integration verbindet.
