name: "Antigravity Agent"
version: "1.0.0"
slug: "antigravity-agent"
image: ghcr.io/faserf/hassio-addons-antigravity-agent-{arch}
description: "Home Assistant Antigravity Agent (autonomous coding agent with Gemini & Antigravity)."
url: "https://github.com/FaserF/hassio-addons/tree/master/antigravity-agent"
arch:
  - amd64
  - aarch64
init: false
host_network: true
map:
  - homeassistant_config:rw
  - share:rw
panel_icon: mdi:robot-cognitive
options:
  log_level: "info"
  antigravity_token: ""
  gemini_token: ""
  github_token: ""
  default_instruction: "Write changes to a new branch, verify them, and submit a pull request when done."
  whatsapp_enabled: false
  whatsapp_url: "http://localhost:8066"
  whatsapp_token: ""

schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  antigravity_token: str?
  gemini_token: str?
  github_token: str?
  default_instruction: str?
  whatsapp_enabled: bool
  whatsapp_url: str?
  whatsapp_token: str?

ports:
  8077/tcp: 8077
hassio_api: true
ingress: true
ingress_port: 8077
ingress_entry: /
