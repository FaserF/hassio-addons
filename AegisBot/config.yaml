---
name: AegisBot
version: "0.5.1"
slug: aegisbot
image: ghcr.io/faserf/hassio-addons-aegisbot-{arch}
description: Professional Telegram Group Defender — Advanced Security, Automated Moderation, and Community Management.
url: https://github.com/FaserF/AegisBot
arch:
  - aarch64
  - amd64
init: false
ingress: true
ingress_stream: true
panel_icon: mdi:robot
ports:
  8077/tcp: 8077
ports_description:
  8077/tcp: Web Interface (HTTP)
map:
  - type: share
    read_only: false
options:
  version: "latest"
  github_token: ""
  github_repo: "FaserF/AegisBot"
  developer_mode: false
  reset_database: false
  log_level: info
  database:
    type: sqlite
  secret_key: ""
  project_name: "AegisBot"
  debug: false
  demo_mode: false
  demo_mode_type: ephemeral
  ai_provider: "gemini"
  release_type: "stable"
  environment: "production"
  default_locale: "en"

schema:
  telegram_bot_token: password?
  telegram_bot_username: str?
  version: str
  github_token: password?
  github_repo: str?
  developer_mode: bool
  reset_database: bool
  reset_database_confirm: bool?
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  database:
    type: list(sqlite|postgresql)
    postgresql_host: str?
    postgresql_port: port?
    postgresql_user: str?
    postgresql_password: password?
    postgresql_database: str?
  secret_key: password?
  project_name: str?
  debug: bool?
  demo_mode: bool
  demo_mode_type: list(ephemeral|persistent)?
  openai_api_key: password?
  gemini_api_key: password?
  security_scan_api_key: password?
  ai_model: str?
  ai_provider: list(openai|gemini)?
  release_type: list(developer|nightly|pre-release|stable)?
  environment: str?
  default_locale: str?
