configuration:
  log_level:
    name: "Log Level"
    description: "Controls the verbosity of the application logs."
  workers:
    name: "Workers"
    description: "Number of worker processes for the hypnotoad web server (default: 2)."
  imprint_name:
    name: "Imprint Name"
    description: "The name to be displayed on the imprint page (Impressum)."
  imprint_address:
    name: "Imprint Address"
    description: "The address to be displayed on the imprint page (Impressum)."
  privacy_policy_url:
    name: "Privacy Policy URL"
    description: "URL pointing to an external privacy policy page. If left blank, a local default placeholder will be used."
network:
  8092/tcp: Web interface port to access DBF outside of Home Assistant (Optional).
