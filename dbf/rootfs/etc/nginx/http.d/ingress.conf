server {
    listen 8099 default_server;
    server_name _;

    # Allow large request bodies (file uploads, etc.)
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8092;

        # Force uncompressed response so sub_filter can work
        proxy_set_header Accept-Encoding "";

        # Standard proxy headers
        # We use $host which is the hostname without the port
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Force HTTPS and standard port 443 to avoid Mixed Content in absolute URLs
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Host $host;
        
        proxy_set_header X-Forwarded-Prefix $http_x_ingress_path;
        proxy_set_header X-Ingress-Path $http_x_ingress_path;

        # Content Security Policy to upgrade insecure requests (HTTP -> HTTPS)
        # This is the best defense against Mixed Content blocks.
        add_header Content-Security-Policy "upgrade-insecure-requests" always;

        # Rewrite absolute asset paths in HTML responses
        # so they include the ingress prefix
        sub_filter_types text/css application/javascript;
        sub_filter_once off;

        # ----------------------------------------------------------------------
        # AGGRESSIVE MIXED CONTENT & PORT FIXES
        # ----------------------------------------------------------------------
        
        # Strip the internal port 8099 from ALL absolute URLs
        sub_filter 'http://$host:8099' 'https://$host';
        sub_filter ':$server_port/' '/';
        sub_filter ':8099/' '/';

        # Ensure absolute URLs for the host are secure
        sub_filter 'http://$host' 'https://$host';

        # Standard root-relative rewrites
        sub_filter 'href="/' 'href="$http_x_ingress_path/';
        sub_filter 'src="/' 'src="$http_x_ingress_path/';
        sub_filter 'action="/' 'action="$http_x_ingress_path/';

        # CSS and JS string rewrites
        sub_filter "url(/" "url($http_x_ingress_path/";
        sub_filter "url('/" "url('$http_x_ingress_path/";
        sub_filter '"/static/' '"$http_x_ingress_path/static/';
        sub_filter "'/static/" "'$http_x_ingress_path/static/";
        sub_filter '"/dyn/' '"$http_x_ingress_path/dyn/';
        sub_filter "'/dyn/" "'$http_x_ingress_path/dyn/";
        sub_filter '"/ajax/' '"$http_x_ingress_path/ajax/';
        sub_filter "'/ajax/" "'$http_x_ingress_path/ajax/";
        sub_filter '"/_' '"$http_x_ingress_path/_';
        sub_filter "'/_" "'$http_x_ingress_path/_";

        # Rewrite Location redirects in headers
        proxy_redirect http://$host:8099/ https://$host$http_x_ingress_path/;
        proxy_redirect http://$host/      https://$host$http_x_ingress_path/;
        proxy_redirect / $http_x_ingress_path/;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
