    name: Datenbank zurücksetzen
    description: Aktiviere diese Option, um die Datenbank zur\u00fcckzusetzen. WARNUNG - L\u00f6scht alle Daten!
  reset_database_confirm:
    name: Datenbank-Reset bestätigen
    description: Best\u00e4tige den Datenbank-Reset. Beide Optionen m\u00fcssen aktiviert sein.
network:
  80/tcp: Weboberfläche
