name: "ShieldDNS"
version: "2.4.1"
slug: "shielddns"
description: "High-performance DoT proxy for AdGuard Home"
url: "https://github.com/FaserF/hassio-addons/tree/master/ShieldDNS"
arch:
  - aarch64
  - amd64
init: false
host_network: true
ingress: true
ingress_port: 80
ingress_entry: "/"
panel_icon: "mdi:shield-dns"
map:
  - homeassistant_config:rw
  - ssl:rw
options:
  upstream_dns: 86.54.11.100 1.1.1.1 9.9.9.9 8.8.8.8 1.0.0.1
  upstream_dot: unfiltered.joindns4.eu dns.quad9.net one.one.one.one dns.google
  prefer_encrypted: true
  certfile: fullchain.pem
  keyfile: privkey.pem
  log_level: "info"
  # DoT Port (Required for Android "Private DNS" Native Setting)
  # SAFE DEFAULT: 8853 (To avoid conflict with AdGuard Home on 853)
  # SETUP: Map WAN Port 853 -> LAN Port 8853 in your Router for Android to work.
  dot_port: 8853
  doh_port: 443
  fallback_dns: false
  fallback_dns_server: 1.1.1.1
schema:
  upstream_dns: str
  upstream_dot: str?
  prefer_encrypted: bool?
  certfile: str
  keyfile: str
  log_level: list(debug|info|warning|error|fatal)?
  dot_port: port?
  doh_port: port?
  fallback_dns: bool?
  fallback_dns_server: str?
  doh_alt_port_1: port?
  doh_alt_port_2: port?
# ports:
#   # With host_network: true, we do not map ports via Docker.
#   # The App binds directly to the ports defined in 'options'.
#   # Removing this section avoids the "Network" configuration tab in HA, which is misleading here.
#   # 853/tcp: 853
#   # 443/tcp: 3443
image: ghcr.io/faserf/hassio-addons-shielddns-{arch}
